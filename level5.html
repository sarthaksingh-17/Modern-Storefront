<body>
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Simple Navbar</title>
      <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
        }
    
        .navbar {
          background-color: #333;
          overflow: hidden;
        }
    
        .navbar a {
          float: left;
          display: block;
          color: white;
          text-align: center;
          padding: 14px 20px;
          text-decoration: none;
        }
    
        .navbar a:hover {
          background-color: #575757;
        }
    
        @media (max-width: 600px) {
          .navbar a {
            float: none;
            display: block;
            text-align: left;
          }
        }
      </style>
    </head>
    <body>
    
      <div class="navbar">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </div>
    
    </body>
    </html>
        
</body>
</html>
